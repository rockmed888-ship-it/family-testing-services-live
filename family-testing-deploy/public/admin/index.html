<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Staff Login | Family Testing Services</title>
  <link rel="icon" href="../images/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-card">
      <div class="admin-brand">
        <img src="../images/logo.png" alt="Family Testing Services">
        <h1>Staff Records</h1>
        <p>Collection, results, verification, and printing</p>
      </div>
      <form id="login-form">
        <label for="password">Staff password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <p id="error" class="error" role="alert"></p>
        <button type="submit" class="btn-primary">Sign In</button>
        <a href="../index.html" class="btn-secondary">← Back to Website</a>
      </form>
      <p class="hint">Authorized staff only. Sessions expire automatically.</p>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script>
    (async function () {
      if (await FTSAdmin.isAuthed()) {
        window.location.replace("dashboard.html");
        return;
      }

      document.getElementById("login-form").addEventListener("submit", async function (event) {
        event.preventDefault();
        const button = this.querySelector("button[type=submit]");
        const error = document.getElementById("error");
        button.disabled = true;
        error.classList.remove("show");
        error.textContent = "";
        try {
          await FTSAdmin.login(document.getElementById("password").value);
          window.location.replace("dashboard.html");
        } catch (err) {
          error.textContent = err.message || "Sign-in failed.";
          error.classList.add("show");
        } finally {
          button.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
