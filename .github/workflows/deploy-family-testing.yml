name: Deploy Family Testing Services

on:
  push:
    branches: [main, cursor/family-testing-services-2b38]
    paths:
      - "family-testing-services/**"
      - ".github/workflows/deploy-family-testing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-family-testing
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: family-testing-services

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
