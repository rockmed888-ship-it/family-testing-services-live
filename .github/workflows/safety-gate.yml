name: Safety Gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test
      - name: Scan production headers
        env:
          JWT_SECRET: ci-placeholder-not-default
        run: pnpm safety:run https://secretlayer.net .
