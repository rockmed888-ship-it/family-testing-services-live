[build]
  command = "corepack enable && pnpm install && pnpm --filter @secretlayer/web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/*"
  to = "https://api.secretlayer.net/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
