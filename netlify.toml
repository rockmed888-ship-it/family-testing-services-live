[build]
  command = "echo 'Family Testing Services — static site, no build step'"
  publish = "family-testing-services"

[build.environment]
  NODE_VERSION = "22"
  NPM_CONFIG_FUND = "false"
  NPM_CONFIG_AUDIT = "false"

[[redirects]]
  from = "/api/*"
  to = "https://api.secretlayer.net/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
