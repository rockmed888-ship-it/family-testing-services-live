<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Staff Login | Family Testing Services</title>
  <link rel="icon" href="../images/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-card">
      <div class="admin-brand">
        <img src="../images/logo.png" alt="Family Testing Services">
        <h1>Staff Documents</h1>
        <p>Family Testing Services — Admin</p>
      </div>
      <form id="login-form">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <p id="error" class="error">Incorrect password. Try again.</p>
        <button type="submit" class="btn-primary">Sign In</button>
        <a href="../index.html" class="btn-secondary">← Back to Website</a>
      </form>
      <p class="hint">Printable testing documents for staff use only.</p>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script>
    if (FTSAdmin.isAuthed()) {
      window.location.href = "dashboard.html";
    }
    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const pw = document.getElementById("password").value;
      const err = document.getElementById("error");
      if (FTSAdmin.login(pw)) {
        window.location.href = "dashboard.html";
      } else {
        err.classList.add("show");
      }
    });
  </script>
</body>
</html>
